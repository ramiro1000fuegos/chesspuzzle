<!DOCTYPE html>
<html lang="multi"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Chess Pattern 3x3</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            background-color: #e9ecef;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 5px;
            justify-content: space-evenly;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, min(28vw, 18vh));
            grid-template-rows: repeat(3, min(28vw, 18vh));
            border: 4px solid #2c3e50;
            border-radius: 4px;
            background-color: #34495e;
            cursor: pointer;
        }

        .board.target-active {
            border-color: #e67e22;
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: min(18vw, 12vh);
            user-select: none;
            line-height: 0;
        }

        .board .cell:nth-child(even) { background-color: #ecf0f1; }
        .board .cell:nth-child(odd) { background-color: #bdc3c7; }

        .label {
            font-weight: bold;
            font-size: clamp(11px, 2.5vw, 14px);
            color: #7f8c8d;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Timer display */
        #timer-display {
            font-size: clamp(22px, 8vw, 40px);
            font-weight: bold;
            color: #27ae60;
            letter-spacing: 2px;
            min-height: 1.4em;
            transition: color 0.3s;
        }
        #timer-display.warning { color: #e67e22; }
        #timer-display.danger  { color: #e74c3c; }
        #timer-display.idle    { color: #bdc3c7; }

        /* Transform buttons row */
        .transform-row {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-transform {
            padding: 8px 10px;
            font-size: clamp(16px, 5vw, 22px);
            cursor: pointer;
            background-color: #2980b9;
            color: white;
            border: none;
            border-radius: 10px;
            box-shadow: 0 3px 5px rgba(0,0,0,0.15);
            transition: transform 0.1s, background-color 0.2s;
            line-height: 1;
        }

        .btn-transform:active { transform: scale(0.93); }

        .btn-reset {
            background-color: #7f8c8d;
            font-size: clamp(12px, 3.5vw, 16px);
            padding: 8px 12px;
        }

        /* NEXT button */
        #action-btn {
            padding: 10px 30px;
            font-size: clamp(16px, 5vw, 22px);
            font-weight: bold;
            cursor: pointer;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }
        #action-btn:active { transform: scale(0.95); }

        /* Alert overlay */
        #alert-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(231,76,60,0.92);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        #alert-overlay.visible { display: flex; }
        #alert-overlay span {
            font-size: clamp(40px, 15vw, 80px);
        }
        #alert-overlay p {
            color: white;
            font-size: clamp(18px, 5vw, 28px);
            font-weight: bold;
            text-align: center;
            padding: 0 20px;
        }
        #dismiss-btn {
            padding: 12px 36px;
            font-size: clamp(16px, 4vw, 22px);
            font-weight: bold;
            background: white;
            color: #e74c3c;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- SOURCE (EN HAUT) -->
    <div class="label">🏁 SOURCE</div>
    <div id="target-board" class="board"></div>

    <!-- NEXT button -->
    <button id="action-btn">NEXT</button>

    <!-- Timer -->
    <div id="timer-display" class="idle">—</div>

    <!-- Transform buttons -->
    <div class="transform-row">
        <button class="btn-transform" id="btn-rot-left"  title="Tourner 90° à gauche">↺</button>
        <button class="btn-transform" id="btn-rot-right" title="Tourner 90° à droite">↻</button>
        <button class="btn-transform" id="btn-flip-h"   title="Symétrie horizontale">↕</button>
        <button class="btn-transform" id="btn-flip-v"   title="Symétrie verticale">↔</button>
        <button class="btn-transform btn-reset" id="btn-reset-target">↩ Reset</button>
    </div>

    <!-- TARGET (EN BAS) -->
    <div id="source-board" class="board"></div>
    <div class="label">🎯 TARGET — <em style="font-style:normal;font-size:0.85em">toucher pour lancer le chrono</em></div>

</div>

<!-- Alert overlay -->
<div id="alert-overlay">
    <span>⏰</span>
    <p>Temps écoulé !</p>
    <button id="dismiss-btn">OK</button>
</div>

<script>
    const PIECES = {
        roi:    '♔',
        dame:   '♕',
        tour:   '♖',
        fou:    '♗',
        cheval: '♘'
    };

    let sourceState = [];
    let targetState = [];        // état courant de la TARGET (peut être transformé)
    let targetOriginal = [];     // TARGET initiale (pour le reset)

    // ── Timer ──────────────────────────────────────────────────────────────
    let timerInterval = null;
    let timerSeconds = 0;
    const TIMER_DURATION = 60;

    const timerEl = document.getElementById('timer-display');

    function updateTimerDisplay(s) {
        const m = Math.floor(s / 60);
        const sec = s % 60;
        timerEl.textContent = m + ':' + String(sec).padStart(2, '0');
        timerEl.className = s <= 10 ? 'danger' : s <= 20 ? 'warning' : '';
    }

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerSeconds = TIMER_DURATION;
        updateTimerDisplay(timerSeconds);

        timerInterval = setInterval(() => {
            timerSeconds--;
            updateTimerDisplay(timerSeconds);
            if (timerSeconds <= 0) {
                clearInterval(timerInterval);
                timerInterval = null;
                showAlert();
            }
        }, 1000);
    }

    function stopTimer() {
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        timerEl.textContent = '—';
        timerEl.className = 'idle';
    }

    function showAlert() {
        // Vibration si dispo
        if (navigator.vibrate) navigator.vibrate([400, 200, 400, 200, 400]);
        document.getElementById('alert-overlay').classList.add('visible');
    }

    document.getElementById('dismiss-btn').addEventListener('click', () => {
        document.getElementById('alert-overlay').classList.remove('visible');
        stopTimer();
    });

    // ── Board generation ───────────────────────────────────────────────────
    function generateBoard() {
        let board = Array(9).fill(null);
        const allIndices = [0,1,2,3,4,5,6,7,8];

        // Fou : coins (0,2,6,8) ou centre (4)
        const validBishopPos = [0, 2, 4, 6, 8];
        const bishopPos = validBishopPos[Math.floor(Math.random() * validBishopPos.length)];
        board[bishopPos] = PIECES.fou;

        // Cheval : pas au centre, pas là où est le fou
        let availableForKnight = allIndices.filter(i => i !== 4 && board[i] === null);
        const knightPos = availableForKnight[Math.floor(Math.random() * availableForKnight.length)];
        board[knightPos] = PIECES.cheval;

        // Roi, Dame, Tour sur cases restantes
        let remaining = [PIECES.roi, PIECES.dame, PIECES.tour];
        let remainingIdx = allIndices.filter(i => board[i] === null);
        remainingIdx.sort(() => Math.random() - 0.5);
        for (let i = 0; i < 3; i++) board[remainingIdx[i]] = remaining[i];

        return board;
    }

    // ── Transformations ────────────────────────────────────────────────────
    // Grille 3×3 : indices 0-8, ligne-major (0=haut-gauche, 2=haut-droit, 6=bas-gauche, 8=bas-droit)

    function rotate90CW(b) {
        // (r,c) → (c, 2-r)  =>  index = r*3+c → (c)*3+(2-r)
        const out = Array(9).fill(null);
        for (let r = 0; r < 3; r++)
            for (let c = 0; c < 3; c++)
                out[c * 3 + (2 - r)] = b[r * 3 + c];
        return out;
    }

    function rotate90CCW(b) {
        // 3× CW = 1× CCW
        return rotate90CW(rotate90CW(rotate90CW(b)));
    }

    function flipHorizontal(b) {
        // Symétrie axe horizontal : ligne r → ligne (2-r)
        const out = Array(9).fill(null);
        for (let r = 0; r < 3; r++)
            for (let c = 0; c < 3; c++)
                out[(2 - r) * 3 + c] = b[r * 3 + c];
        return out;
    }

    function flipVertical(b) {
        // Symétrie axe vertical : colonne c → colonne (2-c)
        const out = Array(9).fill(null);
        for (let r = 0; r < 3; r++)
            for (let c = 0; c < 3; c++)
                out[r * 3 + (2 - c)] = b[r * 3 + c];
        return out;
    }

    // Après transformation, le Fou peut se retrouver hors case sombre → on signale visuellement
    function isBishopValid(board) {
        const darkSquares = [0, 2, 4, 6, 8]; // cases sombres dans grille 3×3 avec coin sombre en 0
        const fIdx = board.indexOf(PIECES.fou);
        return fIdx === -1 || darkSquares.includes(fIdx);
    }

    // ── Render ─────────────────────────────────────────────────────────────
    function renderBoard(elementId, boardData, isTarget) {
        const boardEl = document.getElementById(elementId);
        boardEl.innerHTML = '';

        const valid = !isTarget || isBishopValid(boardData);
        boardEl.style.border = isTarget && !valid ? '4px solid #e74c3c' : '';

        boardData.forEach(piece => {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.textContent = piece || '';
            boardEl.appendChild(cell);
        });
    }

    function renderTarget() {
        renderBoard('source-board', targetState, true);
    }

    // ── NEXT button ────────────────────────────────────────────────────────
    document.getElementById('action-btn').addEventListener('click', () => {
        stopTimer();
        // La TARGET actuelle (éventuellement transformée) devient SOURCE
        // On repart sur l'original pour la transition (la source c'est la position réelle sur le plateau)
        targetState = [...targetOriginal]; // on stocke l'original pour que SOURCE = ce qu'on a effectivement joué
        sourceState = [...targetOriginal];

        // Nouvelle TARGET
        const newTarget = generateBoard();
        targetOriginal = [...newTarget];
        targetState = [...newTarget];

        renderBoard('target-board', sourceState, false);
        renderTarget();
    });

    // ── TARGET : toucher = démarrer chrono ────────────────────────────────
    document.getElementById('source-board').addEventListener('click', () => {
        startTimer();
        document.getElementById('source-board').classList.add('target-active');
    });

    // ── Boutons de transformation ──────────────────────────────────────────
    function applyTransform(fn) {
        targetState = fn(targetState);
        renderTarget();
    }

    document.getElementById('btn-rot-left').addEventListener('click',  () => applyTransform(rotate90CCW));
    document.getElementById('btn-rot-right').addEventListener('click', () => applyTransform(rotate90CW));
    document.getElementById('btn-flip-h').addEventListener('click',    () => applyTransform(flipHorizontal));
    document.getElementById('btn-flip-v').addEventListener('click',    () => applyTransform(flipVertical));

    document.getElementById('btn-reset-target').addEventListener('click', () => {
        targetState = [...targetOriginal];
        renderTarget();
        document.getElementById('source-board').classList.remove('target-active');
    });

    // ── Init ───────────────────────────────────────────────────────────────
    window.onload = () => {
        sourceState = generateBoard();

        const newTarget = generateBoard();
        targetOriginal = [...newTarget];
        targetState    = [...newTarget];

        renderBoard('target-board', sourceState, false);
        renderTarget();
    };
</script>

</body></html>
